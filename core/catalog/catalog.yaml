# Curated catalog of specialized workflow skills/plugins.
# The interview filters by stack (`stacks` / `triggers`) and presents matches.
# Chosen entries are wired by the generator per `wiring`.
#
# Entry shape:
#   id        unique id
#   kind      skill | plugin | external-plugin
#   what      one-line capability summary
#   when      when it's worth using
#   stacks    profile ids this applies to
#   triggers  detector-signal conditions confirming relevance (optional)
#   wiring    how to attach it:
#     claudemd        line spliced into CLAUDE.md "Specialized workflows"
#     pillar_step     {pillar, text} checklist line added to that pillar's rule
#     settings_plugin marketplace ref added to settings.json (external-plugin only)
#     pointer_skill   true -> drop a thin .claude/skills/<id>/SKILL.md pointer
#     entry           path to the human-readable entry doc

entries:
  - id: impeccable
    kind: skill
    what: "Frontend design critique & UX auditing (visual hierarchy, spacing, states, a11y heuristics)."
    when: "UI work in a component-based frontend."
    stacks: [node-ts-react]
    triggers: { has_react: true }
    wiring:
      claudemd: "Frontend/UX audit: invoke `impeccable` before merging UI changes."
      pillar_step: { pillar: review-quality, text: "Run `impeccable` on changes that touch UI components." }
      pointer_skill: true
      entry: entries/impeccable.md

  - id: visual-regression
    kind: skill
    what: "Screenshot capture + perceptual diff to catch unintended UI changes."
    when: "Visual UI that shouldn't change unintentionally."
    stacks: [node-ts-react]
    triggers: { has_react: true }
    wiring:
      claudemd: "Visual regression: run `visual-regression` and attach diffs to the PR for UI changes."
      pillar_step: { pillar: review-quality, text: "Run `visual-regression` and review diffs before merging UI changes." }
      pointer_skill: true
      entry: entries/visual-regression.md

  - id: a11y-audit
    kind: skill
    what: "Accessibility heuristics (roles, labels, contrast, keyboard nav) for web UIs."
    when: "Any user-facing web UI."
    stacks: [node-ts-react]
    triggers: { has_react: true }
    wiring:
      claudemd: "Accessibility: run `a11y-audit` on new or changed interactive UI."
      pillar_step: { pillar: review-quality, text: "Run `a11y-audit` on new interactive components." }
      pointer_skill: true
      entry: entries/a11y-audit.md

  - id: api-contract-audit
    kind: skill
    what: "API contract review — compare handlers/routes against the OpenAPI spec (or generate one) and flag breaking changes, undocumented endpoints, and schema drift."
    when: "Any service exposing an HTTP/gRPC API consumed by others."
    stacks: [python-fastapi, go-service]
    triggers: { has_fastapi: true, has_http_framework: true }   # either signal qualifies
    wiring:
      claudemd: "API contracts: run `api-contract-audit` before merging endpoint or schema changes."
      pillar_step: { pillar: review-quality, text: "Run `api-contract-audit` on changes to routes, handlers, or response models." }
      pointer_skill: true
      entry: entries/api-contract-audit.md

  - id: migration-safety
    kind: skill
    what: "Database migration review — check new migrations for destructive operations, missing reversibility, lock-heavy DDL, and drift between models and schema."
    when: "Projects with schema migrations (e.g. Alembic) touching a shared database."
    stacks: [python-fastapi]
    triggers: { has_fastapi: true }
    wiring:
      claudemd: "Migrations: run `migration-safety` on every new schema migration."
      pillar_step: { pillar: review-quality, text: "Run `migration-safety` on PRs that add or edit a migration." }
      pointer_skill: true
      entry: entries/migration-safety.md

  - id: recursive-workflows
    kind: skill
    what: "Authoring discipline for dynamic Workflow scripts & multi-agent fan-out: context-as-environment, bindings discipline (declared outputs only), bounded-recursion guardrails (depth/calls/budget/timeout), the 6 patterns, and the 5-point RLM rubric."
    when: "Writing a Workflow script, orchestrating subagents, recursive/background fan-out, or any multi-agent decomposition."
    stacks: [node-ts-react, python-fastapi, go-service, unknown]
    wiring:
      claudemd: "Workflow authoring: consult `recursive-workflows` before writing a Workflow script or fanning out subagents (declared outputs only, scout-emits-worklist, depth/calls/budget/timeout guardrails)."
      pillar_step: { pillar: delivery-pipeline, text: "When a step fans out subagents, follow `recursive-workflows`: declared outputs only, the scout emits the work-list (not a hardcoded array), adversarial-verify by default, and depth/calls/budget/timeout guardrails." }
      pointer_skill: true
      entry: entries/recursive-workflows.md

  - id: golden-session
    kind: skill
    what: "Turn a successful ('golden') Claude Code session into a reusable, parameterized dynamic Workflow script — extract the durable task spine, abstract specifics into args, pick orchestration patterns, emit a runnable .claude/workflows/<name>.js."
    when: "A run worked well and should be made repeatable ('capture this session', 'make this repeatable', 'turn this run into a workflow')."
    stacks: [node-ts-react, python-fastapi, go-service, unknown]
    wiring:
      claudemd: "Golden sessions: use `golden-session` to capture a successful run as a committed, replayable `.claude/workflows/<name>.js`."
      pillar_step: { pillar: delivery-pipeline, text: "After a notably good run, consider `golden-session` to capture it as a reusable workflow that follows the `recursive-workflows` conventions." }
      pointer_skill: true
      entry: entries/golden-session.md
