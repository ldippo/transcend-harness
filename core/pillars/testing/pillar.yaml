    tier_eligible: [1, 2, 3]
    tier_default: 3
  - id: characterization
    label: "Characterization"
    desc: "Legacy/untested code: snapshot current behavior before refactoring."
    renders:
      claudemd: fragments/claudemd.testing.md.tmpl
      rule: fragments/rule.testing.md.tmpl
    tier_eligible: [1]
    tier_default: 1
  - id: spike-then-stabilize
    label: "Spike-then-stabilize"
    desc: "Explore without tests, then add tests once the design settles."
