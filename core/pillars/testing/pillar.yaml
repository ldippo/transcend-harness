  - id: tdd-strict
    label: "TDD (strict)"
    desc: "Write a failing test first; no implementation without a red test."
    renders:
      claudemd: fragments/claudemd.testing.md.tmpl
      rule: fragments/rule.testing.md.tmpl
      advisory_hook: fragments/hook.advisory.untested-edit.json.tmpl
